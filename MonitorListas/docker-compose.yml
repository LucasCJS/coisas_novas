services:
  monitor-listas:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: painel-monitor-listas
    restart: always
    ports:
      - "9090:80"
    environment:
      - ADVICE_XML_PATH=/app/config_advice/Advice.xml
      - MonitorSettings__CaminhoPasta=/app/xml_origem
      - TZ=America/Sao_Paulo
      
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - rede_publico:/app/xml_origem
      - "C:/ADVICE/config:/app/config_advice"
      - monitor_db_data:/app/dados
      - monitor_quarentena_data:/app/Quarentena_XML

volumes:
  monitor_db_data:
  monitor_quarentena_data:
  rede_publico:
    driver_opts:
      type: cifs
      device: "//192.168.0.202/publico/Lsantos/ListasRestritiva/in"
      # Note o uso de $$ no final da senha
      o: 'username=lsantos,password=12advice#$$,vers=3.0,domain=advicetech,uid=0,gid=0,file_mode=0777,dir_mode=0777,nounix,noserverino'